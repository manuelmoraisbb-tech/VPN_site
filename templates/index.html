<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPNFiles Python</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] text-white min-h-screen flex flex-col items-center p-6">
    <header class="py-12 text-center">
        <h1 class="text-6xl font-black italic text-blue-500 tracking-tighter">vpnfiles</h1>
        <p class="text-[10px] tracking-[0.4em] text-slate-500 uppercase mt-4">baixe arquivos unitel para http injector e TCX tunnel plus</p>
    </header>

    <div class="w-full max-w-sm space-y-4">
        {% for id, info in apps.items() %}
        <a href="/vpn/{{ id }}" class="block p-6 bg-slate-900/50 border border-slate-800 rounded-[2.5rem] hover:border-blue-500 transition-all flex items-center">
            <img src="/static/icons/{{ id }}.png" class="w-14 h-14 rounded-2xl mr-4">
            <div>
                <h2 class="text-xl font-bold">{{ info.name }}</h2>
                <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Servidor Ativo</span>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
